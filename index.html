<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Tre pay me on Friday?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="snowCanvas"></canvas>

    <!-- Top-right image widgets -->
    <div class="gif-widget" id="widget-allmight">
        <img src="AllMight.gif" alt="All Might" class="gif-img" />
        <span class="gif-label">Now it's your turn to not get paid</span>
    </div>
    <div class="gif-widget" id="widget-heroic">
        <img src="heroic.webp" alt="Heroic" class="gif-img" />
        <span class="gif-label">You don't look very rich, Dylan</span>
    </div>

    <div class="container">
        <h1 class="main-title">Will Tre pay me on Friday?</h1>

        <div class="countdown-box">
            <div class="countdown-days">
                <span id="daysLeft" class="days-number">0</span>
                <p class="days-label">days left</p>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="progressText" class="progress-text">0% Chance</p>
        </div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">Owed Since:</span>
                <span id="startDate" class="info-value">Feb 1, 2026</span>
            </div>
            <div class="info-row">
                <span class="info-label">Next Friday:</span>
                <span id="targetDate" class="info-value">TBD</span>
            </div>
            <div class="info-row">
                <span class="info-label">Fridays Missed:</span>
                <span id="totalDays" class="info-value">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Days Since Owed:</span>
                <span id="daysElapsed" class="info-value">0</span>
            </div>
        </div>

        <div class="status-message">
            <p id="statusMsg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
